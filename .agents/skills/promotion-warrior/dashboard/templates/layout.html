<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Promotion Warrior Dashboard{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased">
    <div class="min-h-screen flex flex-col">
        <!-- Header -->
        <header class="bg-white border-b border-gray-200 sticky top-0 z-40">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16 items-center">
                    <div class="flex items-center">
                        <div class="flex-shrink-0 bg-indigo-600 rounded-md p-2">
                            <i class="fas fa-shield-halved text-white text-xl"></i>
                        </div>
                        <div class="ml-3">
                            <h1 class="text-xl font-bold tracking-tight text-gray-900">Promotion Warrior <span class="text-indigo-600">v4.0</span></h1>
                            <p class="text-xs text-gray-500 font-medium">Dating Engine Affiliate System</p>
                        </div>
                    </div>
                    <nav class="hidden md:flex space-x-8">
                        <a href="/" class="text-gray-900 hover:text-indigo-600 px-3 py-2 text-sm font-medium border-b-2 border-transparent hover:border-indigo-600">Dashboard</a>
                        <a href="/projects" class="text-gray-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium border-b-2 border-transparent hover:border-indigo-600">Projects</a>
                        <a href="/accounts" class="text-gray-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium border-b-2 border-transparent hover:border-indigo-600">Accounts</a>
                        <a href="/analytics" class="text-gray-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium border-b-2 border-transparent hover:border-indigo-600">Analytics</a>
                        <a href="/logs" class="text-gray-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium border-b-2 border-transparent hover:border-indigo-600">Logs</a>
                        <a href="/notifications" class="text-gray-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium border-b-2 border-transparent hover:border-indigo-600">Notifications</a>
                        <a href="/config" class="text-gray-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium border-b-2 border-transparent hover:border-indigo-600">Configuration</a>
                        <a href="/schedule" class="text-gray-500 hover:text-indigo-600 px-3 py-2 text-sm font-medium border-b-2 border-transparent hover:border-indigo-600">Schedule</a>
                    </nav>
                    <div class="flex items-center space-x-4">
                        <div id="global-status-badge" class="flex items-center bg-green-50 text-green-700 px-2.5 py-0.5 rounded-full text-xs font-semibold border border-green-200">
                            <span class="relative flex h-2 w-2 mr-2">
                              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                              <span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span>
                            </span>
                            Online
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- Main Content -->
        <main class="flex-grow">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                {% block content %}{% endblock %}
            </div>
        </main>

        <!-- Footer -->
        <footer class="bg-white border-t border-gray-200 py-6">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col md:flex-row justify-between items-center text-sm text-gray-500">
                    <p>&copy; 2026 Promotion Warrior. All rights reserved.</p>
                    <div class="mt-4 md:mt-0 flex space-x-6">
                        <span class="flex items-center"><i class="fas fa-server mr-2"></i> 127.0.0.1:8787</span>
                        <span class="flex items-center"><i class="fas fa-code-branch mr-2"></i> Dating Edition</span>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        // Common JS logic
        async function updateStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                const badge = document.getElementById('global-status-badge');
                if (data.run_state === 'running') {
                    badge.innerHTML = '<span class="relative flex h-2 w-2 mr-2"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-blue-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-blue-500"></span></span>Running';
                    badge.className = 'flex items-center bg-blue-50 text-blue-700 px-2.5 py-0.5 rounded-full text-xs font-semibold border border-blue-200';
                } else if (data.run_state === 'idle') {
                    badge.innerHTML = '<span class="relative flex h-2 w-2 mr-2"><span class="relative inline-flex rounded-full h-2 w-2 bg-green-500"></span></span>Idle';
                    badge.className = 'flex items-center bg-green-50 text-green-700 px-2.5 py-0.5 rounded-full text-xs font-semibold border border-green-200';
                }
            } catch (e) {
                const badge = document.getElementById('global-status-badge');
                badge.innerHTML = '<span class="relative flex h-2 w-2 mr-2"><span class="relative inline-flex rounded-full h-2 w-2 bg-red-500"></span></span>Disconnected';
                badge.className = 'flex items-center bg-red-50 text-red-700 px-2.5 py-0.5 rounded-full text-xs font-semibold border border-red-200';
            }
        }
        setInterval(updateStatus, 5000);
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
