<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Promotion Warrior 增长控制台{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
        .sidebar-link.active {
            background-color: #f3f4f6;
            color: #4f46e5;
            border-right: 4px solid #4f46e5;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 font-sans antialiased overflow-hidden">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <aside class="hidden md:flex flex-col w-64 bg-white border-r border-gray-200">
            <div class="p-6 flex items-center border-b border-gray-100">
                <div class="bg-indigo-600 rounded-lg p-2 mr-3 shadow-md shadow-indigo-200">
                    <i class="fas fa-shield-halved text-white text-lg"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold text-gray-900 tracking-tight">Warrior <span class="text-indigo-600">v5.0</span></h1>
                    <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">引流增长引擎</p>
                </div>
            </div>

            <nav class="flex-1 overflow-y-auto py-6 space-y-1 px-3">
                <a href="/" class="sidebar-link group flex items-center px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition-all">
                    <i class="fas fa-chart-pie mr-3 text-lg opacity-70 group-hover:scale-110 transition-transform"></i> 总览看板
                </a>
                <a href="/feed" class="sidebar-link group flex items-center px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition-all">
                    <i class="fas fa-bolt mr-3 text-lg opacity-70 group-hover:scale-110 transition-transform"></i> 线索发现
                    <span id="feed-badge" class="ml-auto bg-indigo-100 text-indigo-600 text-[10px] px-2 py-0.5 rounded-full font-bold">New</span>
                </a>
                <a href="/inbox" class="sidebar-link group flex items-center px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition-all">
                    <i class="fas fa-comment-dots mr-3 text-lg opacity-70 group-hover:scale-110 transition-transform"></i> 消息中心
                    <span id="inbox-count-badge" class="ml-auto bg-red-100 text-red-600 text-[10px] px-2 py-0.5 rounded-full font-bold hidden">0</span>
                </a>
                <div class="pt-6 pb-2 px-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">业务管理</div>
                <a href="/projects" class="sidebar-link group flex items-center px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition-all">
                    <i class="fas fa-layer-group mr-3 text-lg opacity-70 group-hover:scale-110 transition-transform"></i> 项目管理
                </a>
                <a href="/accounts" class="sidebar-link group flex items-center px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition-all">
                    <i class="fas fa-user-group mr-3 text-lg opacity-70 group-hover:scale-110 transition-transform"></i> 账号池
                </a>
                <a href="/insights" class="sidebar-link group flex items-center px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition-all">
                    <i class="fas fa-lightbulb mr-3 text-lg opacity-70 group-hover:scale-110 transition-transform"></i> 市场洞察
                </a>
                <a href="/analytics" class="sidebar-link group flex items-center px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition-all">
                    <i class="fas fa-chart-line mr-3 text-lg opacity-70 group-hover:scale-110 transition-transform"></i> 效果分析
                </a>

                <div class="pt-6 pb-2 px-4 text-[10px] font-bold text-gray-400 uppercase tracking-widest">系统监控</div>
                <a href="/logs" class="sidebar-link group flex items-center px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition-all">
                    <i class="fas fa-terminal mr-3 text-lg opacity-70 group-hover:scale-110 transition-transform"></i> 实时日志
                </a>
                <a href="/schedule" class="sidebar-link group flex items-center px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition-all">
                    <i class="fas fa-clock mr-3 text-lg opacity-70 group-hover:scale-110 transition-transform"></i> 自动化调度
                </a>
                <a href="/notifications" class="sidebar-link group flex items-center px-4 py-3 text-sm font-semibold rounded-xl text-gray-500 hover:bg-gray-50 hover:text-indigo-600 transition-all">
                    <i class="fas fa-bell mr-3 text-lg opacity-70 group-hover:scale-110 transition-transform"></i> 告警通知
                </a>
            </nav>

            <div class="p-6 border-t border-gray-100 bg-gray-50/50">
                <div class="flex items-center">
                    <div class="w-8 h-8 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-600 mr-3">
                        <i class="fas fa-user-circle text-lg"></i>
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-xs font-bold text-gray-900 truncate">u/hanshan0228</p>
                        <p class="text-[10px] text-green-500 font-bold uppercase tracking-tight flex items-center">
                            <span class="w-1.5 h-1.5 bg-green-500 rounded-full mr-1.5"></span>
                            本地节点已连接
                        </p>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <div class="flex-1 flex flex-col h-screen overflow-hidden">
            <!-- Mobile Header -->
            <header class="md:hidden bg-white border-b border-gray-200 p-4 flex justify-between items-center h-16">
                <div class="flex items-center">
                    <div class="bg-indigo-600 rounded-lg p-2 mr-3">
                        <i class="fas fa-shield-halved text-white text-lg"></i>
                    </div>
                    <h1 class="text-lg font-bold text-gray-900 tracking-tight">Warrior <span class="text-indigo-600">v5.0</span></h1>
                </div>
                <button id="mobile-menu-btn" class="p-2 text-gray-500"><i class="fas fa-bars text-xl"></i></button>
            </header>

            <!-- Page Header (Dynamic) -->
            <header class="bg-white border-b border-gray-100 p-6 flex justify-between items-center z-10 shadow-sm shadow-gray-50">
                <h2 id="page-title" class="text-xl font-extrabold text-gray-900 tracking-tight">{% block header_title %}控制台{% endblock %}</h2>
                <div class="flex items-center space-x-4">
                    <div id="status-bubble" class="flex items-center space-x-2 bg-green-50 border border-green-100 px-3 py-1 rounded-full">
                        <div class="w-2 h-2 bg-green-500 rounded-full animate-pulse"></div>
                        <span class="text-[10px] font-bold text-green-700 uppercase">引擎运行中</span>
                    </div>
                    <button class="p-2 text-gray-400 hover:text-indigo-600 transition-colors"><i class="fas fa-magnifying-glass"></i></button>
                    <button class="p-2 text-gray-400 hover:text-indigo-600 transition-colors relative">
                        <i class="fas fa-bell"></i>
                        <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full border-2 border-white"></span>
                    </button>
                </div>
            </header>

            <!-- Scrollable Content -->
            <main class="flex-1 overflow-y-auto p-8 scroll-smooth">
                {% block content %}{% endblock %}
            </main>
        </div>
    </div>

    <script>
        // Set active state on sidebar
        const currentPath = window.location.pathname;
        const links = document.querySelectorAll('.sidebar-link');
        links.forEach(link => {
            const href = link.getAttribute('href');
            if (href === currentPath || (href !== '/' && currentPath.startsWith(href))) {
                link.classList.add('active');
                link.classList.remove('text-gray-500');
            }
        });

        // Background status update
        async function updateEngineStatus() {
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                const bubble = document.getElementById('status-bubble');
                const badge = document.getElementById('inbox-count-badge');

                if (data.queues && (data.queues.p0 + data.queues.p1 > 0)) {
                    badge.innerText = data.queues.p0 + data.queues.p1;
                    badge.classList.remove('hidden');
                } else {
                    badge.classList.add('hidden');
                }

                if (data.run_state === 'running') {
                    bubble.innerHTML = '<div class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></div><span class="text-[10px] font-bold text-blue-700 uppercase">巡查中...</span>';
                    bubble.className = 'flex items-center space-x-2 bg-blue-50 border border-blue-100 px-3 py-1 rounded-full';
                } else {
                    bubble.innerHTML = '<div class="w-2 h-2 bg-green-500 rounded-full"></div><span class="text-[10px] font-bold text-green-700 uppercase">系统在线</span>';
                    bubble.className = 'flex items-center space-x-2 bg-green-50 border border-green-100 px-3 py-1 rounded-full';
                }
            } catch (e) {}
        }
        setInterval(updateEngineStatus, 5000);
        updateEngineStatus();
    </script>
    {% block scripts %}{% endblock %}
</body>
</html>
