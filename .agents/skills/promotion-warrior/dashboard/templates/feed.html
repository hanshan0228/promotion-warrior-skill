{% extends "layout.html" %}

{% block title %}线索发现 | Promotion Warrior{% endblock %}
{% block header_title %}高潜线索信息流 (Lead Feed){% endblock %}

{% block content %}
<div class="max-w-3xl mx-auto space-y-6">
    <div class="flex justify-between items-center mb-6">
        <p class="text-sm text-gray-500">人工审核 AI 发现的高潜力帖子，并一键批准自动生成的回复草稿。</p>
        <button onclick="loadFeed()" class="text-indigo-600 bg-indigo-50 hover:bg-indigo-100 px-3 py-1.5 rounded-lg text-xs font-bold transition-all flex items-center">
            <i class="fas fa-sync-alt mr-2" id="sync-icon"></i> 扫描最新
        </button>
    </div>

    <div id="feed-container" class="space-y-6">
        <div class="p-12 text-center bg-white border border-gray-100 rounded-2xl shadow-sm">
            <i class="fas fa-satellite-dish text-4xl text-gray-300 mb-4 animate-pulse"></i>
            <p class="text-gray-500 font-medium">正在扫描 Subreddits 以寻找高意向潜客...</p>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    async function loadFeed() {
        const container = document.getElementById('feed-container');
        const syncIcon = document.getElementById('sync-icon');
        syncIcon.classList.add('fa-spin');

        try {
            const res = await fetch('/api/feed');
            const data = await res.json();

            if (data.leads && data.leads.length > 0) {
                container.innerHTML = data.leads.map(lead => `
                    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden hover-card transition-all" id="lead-${lead.id}">
                        <!-- Header / Scoring -->
                        <div class="px-6 py-4 border-b border-gray-50 bg-gray-50/50 flex justify-between items-center">
                            <div class="flex items-center space-x-3">
                                <div class="w-10 h-10 rounded-full flex items-center justify-center font-bold text-white shadow-inner ${lead.grade === 'S' || lead.grade === 'A' ? 'bg-gradient-to-br from-indigo-500 to-purple-600' : 'bg-gray-300'}">
                                    ${lead.score}
                                </div>
                                <div>
                                    <p class="text-xs font-bold text-gray-900">相关性评分</p>
                                    <p class="text-[10px] text-gray-500 font-mono">等级: ${lead.grade}</p>
                                </div>
                            </div>
                            <div class="flex space-x-2">
                                ${lead.factors.map(f => `<span class="px-2 py-1 bg-yellow-50 text-yellow-700 text-[10px] font-bold rounded-md border border-yellow-100">${f.split(':')[1] || f}</span>`).join('')}
                            </div>
                        </div>

                        <!-- Post Content -->
                        <div class="p-6">
                            <div class="flex items-center text-xs text-gray-400 mb-2">
                                <i class="${lead.platform === 'reddit' ? 'fab fa-reddit text-orange-500' : 'fab fa-twitter text-blue-400'} mr-1.5"></i>
                                <span class="font-bold text-gray-600 mr-2">${lead.platform === 'reddit' ? 'u/' : '@'}${lead.author}</span>
                                &bull; <a href="${lead.url}" target="_blank" class="ml-2 hover:underline">查看原帖 <i class="fas fa-external-link-alt text-[10px]"></i></a>
                            </div>
                            <h3 class="text-lg font-bold text-gray-900 mb-2">${lead.title}</h3>
                            <div class="text-sm text-gray-600 line-clamp-3 prose prose-sm">${marked.parse(lead.text || '*无内容*')}</div>
                        </div>

                        <!-- AI Draft & Actions -->
                        <div class="px-6 py-5 bg-indigo-50/30 border-t border-indigo-50">
                            <p class="text-[10px] font-bold text-indigo-400 uppercase tracking-widest mb-2 flex items-center">
                                <i class="fas fa-robot mr-1.5"></i> AI 生成的回复草稿
                            </p>
                            <textarea id="draft-${lead.id}" class="w-full bg-white border border-indigo-100 rounded-xl p-3 text-sm text-gray-700 focus:ring-2 focus:ring-indigo-500 focus:outline-none resize-none" rows="3">${lead.draft}</textarea>

                            <div class="flex justify-between items-center mt-4">
                                <button onclick="dismissLead('${lead.id}')" class="text-gray-400 hover:text-red-500 text-xs font-bold transition-colors">
                                    <i class="fas fa-times mr-1"></i> 忽略此帖
                                </button>
                                <button onclick="approveLead('${lead.id}')" class="bg-indigo-600 hover:bg-indigo-700 text-white px-6 py-2 rounded-lg text-sm font-bold shadow-md shadow-indigo-200 transition-all flex items-center">
                                    <i class="fas fa-paper-plane mr-2"></i> 批准并发送
                                </button>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else {
                container.innerHTML = \`
                    <div class="p-12 text-center bg-white border border-gray-100 rounded-2xl shadow-sm">
                        <i class="fas fa-check-circle text-4xl text-green-400 mb-4"></i>
                        <h3 class="text-lg font-bold text-gray-900">暂时没有新线索</h3>
                        <p class="text-gray-500 font-medium mt-1">最近的扫描中未发现满足条件的高意向帖子。</p>
                    </div>\`;
            }
        } catch (e) {
            container.innerHTML = '<div class="p-6 text-center text-red-500 font-bold">获取信息流失败</div>';
        } finally {
            syncIcon.classList.remove('fa-spin');
        }
    }

    function dismissLead(id) {
        document.getElementById(`lead-${id}`).style.display = 'none';
    }

    function approveLead(id) {
        const btn = event.currentTarget;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> 发送中...';
        btn.classList.replace('bg-indigo-600', 'bg-green-500');

        setTimeout(() => {
            btn.innerHTML = '<i class="fas fa-check mr-2"></i> 已发送';
            setTimeout(() => dismissLead(id), 1000);
        }, 1500);
    }

    loadFeed();
</script>
{% endblock %}
