{% extends "layout.html" %}

{% block title %}消息中心 | Promotion Warrior{% endblock %}
{% block header_title %}消息中心 (Inbox){% endblock %}

{% block content %}
<div class="space-y-8 relative">
    <div class="flex justify-between items-center">
        <h2 class="text-2xl font-bold text-gray-900 flex items-center">
            <i class="fas fa-inbox mr-3 text-indigo-600"></i> 交互式收件箱
        </h2>
        <div class="flex items-center space-x-4">
            <select id="profile-selector" onchange="loadInbox()" class="bg-white border border-gray-300 text-gray-900 text-sm rounded-lg focus:ring-indigo-500 focus:border-indigo-500 p-2 font-bold shadow-sm">
                <option value="bjudz9gq">u/hanshan0228 (bjudz9gq)</option>
            </select>
            <button onclick="loadInbox()" class="bg-white hover:bg-gray-50 border border-gray-200 text-gray-700 px-4 py-2 rounded-lg text-sm font-semibold transition-colors flex items-center shadow-sm">
                <i class="fas fa-sync-alt mr-2" id="sync-icon"></i> 刷新消息
            </button>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Message List -->
        <div class="md:col-span-1 bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden flex flex-col h-[75vh]">
            <div class="p-4 border-b border-gray-100 bg-gray-50/50">
                <h3 class="font-bold text-gray-700 text-sm uppercase tracking-wider">未读与近期对话</h3>
            </div>
            <div id="message-list" class="flex-1 overflow-y-auto divide-y divide-gray-100">
                <div class="p-6 text-center text-gray-400">
                    <i class=\"fas fa-spinner fa-spin text-2xl mb-2\"></i>
                    <p class="text-sm">正在通过 OpenCLI 连接 Reddit...</p>
                </div>
            </div>
        </div>

        <!-- Conversation View -->
        <div class="md:col-span-2 bg-white rounded-xl shadow-sm border border-gray-100 flex flex-col h-[75vh]">
            <div id="active-chat-header" class="p-4 border-b border-gray-100 bg-gray-50/50 flex justify-between items-center hidden">
                <div>
                    <h3 id="chat-author" class="font-bold text-gray-900 text-lg">请选择一个对话</h3>
                    <p id="chat-subject" class="text-xs text-gray-500 font-mono"></p>
                </div>
                <span class="px-2 py-1 bg-green-100 text-green-800 text-[10px] font-bold rounded uppercase">正在对话</span>
            </div>

            <div id="chat-body" class="flex-1 overflow-y-auto p-6 bg-gray-50/30">
                <div class="h-full flex items-center justify-center text-gray-400">
                    <div class="text-center">
                        <i class="far fa-comments text-4xl mb-3"></i>
                        <p>未选中任何对话</p>
                    </div>
                </div>
            </div>

            <div id="reply-box" class="p-4 border-t border-gray-100 bg-white hidden">
                <form onsubmit="sendReply(event)">
                    <div class="relative">
                        <textarea id="reply-text" rows="3" required class="w-full border border-gray-300 rounded-lg pl-3 pr-12 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 resize-none" placeholder="输入回复内容... (建议以'You'开头，模仿真人口吻)"></textarea>
                        <button type="submit" id="btn-reply" class="absolute bottom-3 right-3 p-2 bg-indigo-600 hover:bg-indigo-700 text-white rounded-md transition-colors">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                    <div class="flex justify-between items-center mt-2">
                        <p class="text-[10px] text-gray-400"><i class="fas fa-info-circle"></i> 回复将通过本机浏览器桥接发送，自带反爬保护。</p>
                        <button type="button" onclick="insertTemplate()" class="text-xs text-indigo-600 font-bold hover:underline">插入引流模板</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
    let messagesData = [];
    let currentActiveMsg = null;

    async function loadInbox() {
        const profile = document.getElementById('profile-selector').value;
        const list = document.getElementById('message-list');
        const syncIcon = document.getElementById('sync-icon');

        syncIcon.classList.add('fa-spin');
        list.innerHTML = `<div class="p-6 text-center text-gray-400"><i class="fas fa-spinner fa-spin text-2xl mb-2"></i><p class="text-sm">正在同步消息...</p></div>`;

        try {
            const res = await fetch(`/api/inbox?profile=${profile}`);
            const data = await res.json();

            if (data.messages && data.messages.length > 0) {
                messagesData = data.messages;
                renderMessageList();
            } else {
                list.innerHTML = `<div class="p-8 text-center text-gray-500"><i class="fas fa-inbox text-3xl mb-3 text-gray-300"></i><p>收件箱空空如也</p></div>`;
            }
        } catch (e) {
            list.innerHTML = `<div class="p-6 text-center text-red-500"><i class="fas fa-exclamation-triangle text-2xl mb-2"></i><p class="text-sm">同步失败，请检查后端进程</p></div>`;
        } finally {
            syncIcon.classList.remove('fa-spin');
        }
    }

    function renderMessageList() {
        const list = document.getElementById('message-list');
        list.innerHTML = messagesData.map((m, idx) => {
            const d = m.data;
            const isNew = d.new;
            return `
            <div onclick="openChat(${idx})" class="p-4 cursor-pointer hover:bg-indigo-50 transition-colors ${isNew ? 'bg-blue-50/50 border-l-4 border-blue-500' : ''}">
                <div class="flex justify-between items-start mb-1">
                    <span class="font-bold text-gray-900 text-sm">u/${d.author}</span>
                    <span class="text-[10px] text-gray-400">${new Date(d.created_utc * 1000).toLocaleDateString()}</span>
                </div>
                <p class="text-xs text-gray-500 font-semibold truncate mb-1">${d.subject}</p>
                <p class="text-xs text-gray-600 line-clamp-2">${d.body}</p>
            </div>
            `;
        }).join('');
    }

    function openChat(index) {
        currentActiveMsg = messagesData[index].data;

        document.getElementById('active-chat-header').classList.remove('hidden');
        document.getElementById('reply-box').classList.remove('hidden');

        document.getElementById('chat-author').innerText = `u/${currentActiveMsg.author}`;
        document.getElementById('chat-subject').innerText = currentActiveMsg.subject;

        document.getElementById('chat-body').innerHTML = `
            <div class="flex flex-col space-y-4">
                <div class="self-start max-w-[80%] bg-white border border-gray-200 p-4 rounded-2xl rounded-tl-sm shadow-sm">
                    <p class="text-xs text-gray-400 mb-2 font-mono">对方发来的消息</p>
                    <div class="text-sm text-gray-800 prose prose-sm">${marked.parse(currentActiveMsg.body)}</div>
                </div>
            </div>
        `;
        document.getElementById('reply-text').value = '';
        document.getElementById('reply-text').focus();
    }

    function insertTemplate() {
        const ta = document.getElementById('reply-text');
        ta.value = "Hey man, totally get it. I pinned a free diagnostic tool on my profile that breaks down exactly why the algorithm hides profiles. Check my bio, it might save you a lot of time.";
    }

    async function sendReply(e) {
        e.preventDefault();
        if (!currentActiveMsg) return;

        const btn = document.getElementById('btn-reply');
        const ta = document.getElementById('reply-text');
        const text = ta.value;
        const profile = document.getElementById('profile-selector').value;

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';

        try {
            const res = await fetch('/api/inbox/reply', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    account_profile: profile,
                    thing_id: currentActiveMsg.name,
                    text: text
                })
            });

            if (res.ok) {
                document.getElementById('chat-body').innerHTML += `
                    <div class="self-end max-w-[80%] bg-indigo-600 text-white p-4 rounded-2xl rounded-tr-sm shadow-sm mt-4">
                        <div class="text-sm">${marked.parse(text)}</div>
                    </div>
                `;
                ta.value = '';
                const cb = document.getElementById('chat-body');
                cb.scrollTop = cb.scrollHeight;
            } else {
                alert('回复发送失败');
            }
        } catch (error) {
            alert('网络请求异常');
        } finally {
            btn.innerHTML = '<i class="fas fa-paper-plane"></i>';
            btn.disabled = false;
        }
    }

    loadInbox();
</script>
{% endblock %}
